      .dot{fill:#565a5e}
      .label{fill:#17c9aa;font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:44px}
      .orient{fill:#57cdbd;font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:30px;letter-spacing:.5px}
      .credit{fill:#33383c;font-family:Arial,Helvetica,sans-serif;font-size:16px}
